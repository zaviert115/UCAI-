<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <!-- Background is transparent — sits on top of navy sections -->

  <!-- Horizontal traces -->
  <line x1="0" y1="120" x2="200" y2="120" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.15"/>
  <line x1="200" y1="120" x2="200" y2="200" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.15"/>
  <line x1="200" y1="200" x2="400" y2="200" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.15"/>
  <line x1="400" y1="200" x2="400" y2="80" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.15"/>
  <line x1="400" y1="80" x2="640" y2="80" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.15"/>
  <line x1="640" y1="80" x2="640" y2="300" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.15"/>
  <line x1="640" y1="300" x2="800" y2="300" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.15"/>

  <line x1="0" y1="380" x2="160" y2="380" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.10"/>
  <line x1="160" y1="380" x2="160" y2="460" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.10"/>
  <line x1="160" y1="460" x2="520" y2="460" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.10"/>
  <line x1="520" y1="460" x2="520" y2="360" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.10"/>
  <line x1="520" y1="360" x2="800" y2="360" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.10"/>

  <!-- Nodes (circuit connection dots) -->
  <circle cx="200" cy="120" r="4" fill="#22D3EE" fill-opacity="0.25"/>
  <circle cx="200" cy="200" r="4" fill="#22D3EE" fill-opacity="0.25"/>
  <circle cx="400" cy="200" r="4" fill="#22D3EE" fill-opacity="0.25"/>
  <circle cx="400" cy="80"  r="4" fill="#22D3EE" fill-opacity="0.25"/>
  <circle cx="640" cy="80"  r="4" fill="#22D3EE" fill-opacity="0.25"/>
  <circle cx="640" cy="300" r="4" fill="#22D3EE" fill-opacity="0.25"/>

  <circle cx="160" cy="380" r="3" fill="#22D3EE" fill-opacity="0.18"/>
  <circle cx="160" cy="460" r="3" fill="#22D3EE" fill-opacity="0.18"/>
  <circle cx="520" cy="460" r="3" fill="#22D3EE" fill-opacity="0.18"/>
  <circle cx="520" cy="360" r="3" fill="#22D3EE" fill-opacity="0.18"/>

  <!-- Accent nodes (brighter) -->
  <circle cx="400" cy="200" r="6" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.35" fill="none"/>
  <circle cx="640" cy="300" r="6" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.35" fill="none"/>

  <!-- Small secondary traces -->
  <line x1="320" y1="0" x2="320" y2="80" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="320" y1="80" x2="400" y2="80" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="300" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="720" y1="300" x2="800" y2="300" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.08"/>
  <circle cx="320" cy="80" r="3" fill="#22D3EE" fill-opacity="0.15"/>
  <circle cx="720" cy="300" r="3" fill="#22D3EE" fill-opacity="0.15"/>
</svg>
