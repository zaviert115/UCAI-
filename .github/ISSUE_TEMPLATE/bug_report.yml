name: Bug report
description: Something is broken on the site
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill in as much detail as you can.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: "Contact form doesn't submit on mobile"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Go to /contact
        2. Fill in all fields
        3. Tap Submit
        4. Nothing happens
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: Form submits and shows a success message
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: Nothing happens, no error shown
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / browser
      placeholder: "iPhone 15 / Safari 17"
