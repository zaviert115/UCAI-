name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Provide dummy values so the build doesn't fail on missing env vars
          RESEND_API_KEY: re_placeholder
          CONTACT_TO_EMAIL: committee@ucaisoc.nz
          CONTACT_FROM_EMAIL: noreply@ucaisoc.nz
